<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - Todo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>Todo List</h1>

    <div class="auth-tabs">
      <button id="tab-login" class="tab-btn active">로그인</button>
      <button id="tab-signup" class="tab-btn">회원가입</button>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="login-email" placeholder="이메일 입력" required>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-password" placeholder="비밀번호 입력" required>
      </div>
      <p id="login-error" class="error-msg"></p>
      <button type="submit" class="submit-btn">로그인</button>
    </form>

    <form id="signup-form" style="display:none">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="signup-email" placeholder="이메일 입력" required>
      </div>
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="signup-nickname" placeholder="닉네임 입력" required>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="signup-password" placeholder="6자 이상" required>
      </div>
      <div class="form-group">
        <label>비밀번호 확인</label>
        <input type="password" id="signup-confirm" placeholder="비밀번호 재입력" required>
      </div>
      <p id="signup-error" class="error-msg"></p>
      <p id="signup-success" class="success-msg"></p>
      <button type="submit" class="submit-btn">가입하기</button>
    </form>

    <div class="social-divider">또는</div>
    <button id="btn-google" class="social-btn google">Google로 로그인</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
